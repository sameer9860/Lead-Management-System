{% extends "base.html" %}
{% block content %}
{% block sidebar %}{% endblock %}

    
<style>
    body {
        background: linear-gradient(135deg, #1e1e2f 0%, #2d3748 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #f8f9fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh; /* Full height center */
        margin: 0;
    }
    .login-container {
        width: 100%;
        max-width: 420px;
        background: #2d2d3a;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
        animation: fadeIn 0.8s ease-in-out;
    }
    .login-container h2 {
        text-align: center;
        font-weight: 600;
        margin-bottom: 25px;
        color: #60a5fa; /* Tailwind sky-400 shade */
    }
    .form-label {
        font-weight: 500;
        margin-bottom: 8px;
        display: block;
        color: #e5e7eb;
    }
    .form-control {
        width: 100%;
        border-radius: 8px;
        padding: 10px;
        border: 1px solid #444;
        background: #1e1e2f;
        color: #f8f9fa;
        transition: 0.3s;
    }
    .form-control:focus {
        border-color: #60a5fa;
        outline: none;
        box-shadow: 0 0 5px #60a5fa;
    }
    .btn-primary {
        background: #60a5fa;
        border: none;
        border-radius: 8px;
        font-weight: 500;
        padding: 10px;
        transition: all 0.3s ease;
    }
    .btn-primary:hover {
        background: #3b82f6;
        transform: translateY(-2px);
    }

    /* Password toggle */
    .password-wrapper {
        position: relative;
    }
    .toggle-password {
        position: absolute;
        right: 12px;
        top: 62%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 1.1rem;
        color: #9ca3af;
        user-select: none;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="login-container">
    <div class="toast toast-end toast-top ">
        {% for message in messages %}
        <div class="alert alert-error alert-soft" style="color: #f44336; ">
            <i class="fas fa-exclamation-triangle"></i>
            <strong>Error:</strong>
            <span>{{message}}</span>
        </div>
        {% endfor %}
    </div>

    <h2>Login</h2>
    <form method="post">

        {% csrf_token %}

        <!-- Username -->
        <div class="mb-3">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" name="username" class="form-control" id="id_username" required>
        </div>
        <div class="mb-3 password-wrapper position-relative">
            <label for="id_password" class="form-label">Password</label>
            <input type="password" name="password" class="form-control pe-5" id="id_password" required>
            <span class="toggle-password position-absolute end-0 top-50 translate-middle-y me-3" style="cursor: pointer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path class="eye-icon" d="M12 5C5 5 1 12 1 12s4 7 11 7 11-7 11-7-4-7-11-7z" />
                    <circle class="eye-icon" cx="12" cy="12" r="3" />
                    <path class="slash-icon" d="M4 4l16 16" stroke-width="2" stroke-linecap="round" style="display: none"/>
                </svg>
            </span>
        </div>
        <button type="submit" class="btn btn-primary w-90">Login</button>
    </form>

        </div>
        
        <script>
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById("id_password");
            const slashIcon = this.querySelector(".slash-icon");
            
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                slashIcon.style.display = "block";
            } else {
                passwordInput.type = "password";
                slashIcon.style.display = "none";
            }
        });
        </script>
{% endblock %}
